# SmartDNS 配置文件 (模板)
# 实际配置由 entrypoint.sh 动态生成，此文件不要手动修改 ip-rules
# ============================================
# 监听配置
# ============================================

bind [::]:53

# ============================================
# Bootstrap DNS & Fallback DNS
# ============================================

server 114.114.114.114 -bootstrap-dns -exclude-default-group
server 114.114.114.114 -fallback

# ============================================
# 上游 DNS 服务器 (阿里云优先 H3)
# ============================================

# --- 阿里 DNS (H3 最优先) ---
server-h3 h3://223.5.5.5/dns-query
server-h3 h3://223.6.6.6/dns-query
server-h3 h3://2400:3200::1/dns-query
server-h3 h3://2400:3200:baba::1/dns-query

# --- 阿里 DNS (DoH 备用) ---
server-https https://223.5.5.5/dns-query
server-https https://223.6.6.6/dns-query

# --- 阿里 DNS (UDP 备用) ---
server 223.5.5.5
server 223.6.6.6

# --- 腾讯 DNS (DoH) ---
server-https https://119.29.29.29/dns-query
server-https https://119.28.28.28/dns-query

# --- 腾讯 DNS (UDP 备用) ---
server 119.29.29.29
server 119.28.28.28

# ============================================
# 速度测试配置 (tcp443 > tcp80 > ping)
# ============================================

speed-check-mode tcp:443,tcp:80,ping
response-mode first-ping

# ============================================
# 缓存配置
# ============================================

cache-size 32768
cache-persist yes
cache-file /var/lib/smartdns/smartdns.cache
cache-checkpoint-time 3600
serve-expired no
rr-ttl-reply-max 86400
local-ttl 60

# ============================================
# 特定域名不缓存
# ============================================

domain-rules /.yegetables.com/ -no-cache
domain-rules /.yegetables.cloudns.ch/ -no-cache

# ============================================
# 双栈 IPv6 配置 (优先 IPv4)
# ============================================

dualstack-ip-selection yes
dualstack-ip-selection-threshold 5

# ============================================
# Cloudflare IP 段 (ip-set 静态定义)
# ip-rules 由 entrypoint.sh 根据优选 IP 动态生成
# ============================================

ip-set -name cloudflare-ipv4 -file /var/lib/smartdns/cloudflare-ips/cloudflare-ipv4.txt
ip-set -name cloudflare-ipv6 -file /var/lib/smartdns/cloudflare-ips/cloudflare-ipv6.txt
# CF_IP_RULES_PLACEHOLDER

# ============================================
# 审计日志
# ============================================

audit-enable yes
audit-file /var/log/smartdns/smartdns-audit.log
audit-size 4M
audit-num 4
audit-file-mode 644

# ============================================
# 运行日志
# ============================================

log-level info
log-file /var/log/smartdns/smartdns.log
log-size 4M
log-num 3

# ============================================
# 其他配置
# ============================================

max-reply-ip-num 5
tcp-idle-time 120
server-name smartdns
data-dir /var/lib/smartdns

# ============================================
# WebUI 仪表盘
# ============================================

plugin smartdns_ui.so
smartdns-ui.ip http://[::]:6080
smartdns-ui.user admin
smartdns-ui.password password
smartdns-ui.max-query-log-age 604800
smartdns-ui.token-expire 600
smartdns-ui.enable-terminal yes
